<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EduNex — Screen Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="edunex/theme.css" />
<style>
  html, body { height:100%; margin:0; }
  body { background:#f0eee9; }
  #root { height:100vh; }
  /* EduNex uses Bricolage Grotesque for headings (set by the live app harness) */
  :root { --font-head:'Bricolage Grotesque','Plus Jakarta Sans',system-ui,sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- EduNex data (plain JS, defines window.VZ) -->
<script src="edunex/data.js"></script>

<!-- Device frames + design canvas -->
<script type="text/babel" src="frames/browser-window.jsx"></script>
<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<!-- Primitives (shared) -->
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/ui.jsx"></script>

<!-- EduNex brand: logo + login -->
<script type="text/babel" src="edunex/login.jsx"></script>

<!-- Admin screens (shared + EduNex forks) -->
<script type="text/babel" src="edunex/dashboard.jsx"></script>
<script type="text/babel" src="edunex/classes.jsx"></script>
<script type="text/babel" src="edunex/calendar.jsx"></script>
<script type="text/babel" src="src/admin-materials.jsx"></script>
<script type="text/babel" src="edunex/people.jsx"></script>
<script type="text/babel" src="edunex/shell.jsx"></script>

<!-- Teacher + student -->
<script type="text/babel" src="edunex/teacher.jsx"></script>
<script type="text/babel" src="edunex/student.jsx"></script>

<!-- Canvas harness (last) -->
<script type="text/babel" src="edunex/canvas.jsx"></script>
</body>
</html>
